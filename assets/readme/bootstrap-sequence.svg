<svg width="100%" height="150" viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Stage 1: .exe -->
  <rect x="50" y="50" width="120" height="80" rx="8" fill="#0f0f0f" stroke="#00ff88" stroke-width="2"/>
  <text x="110" y="75" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#00ff88">Stage 1</text>
  <text x="110" y="90" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#e0e0e0">Windows .exe</text>
  <text x="110" y="105" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#e0e0e0">GUI Installer</text>

  <!-- Stage 2: PowerShell -->
  <rect x="325" y="50" width="120" height="80" rx="8" fill="#0f0f0f" stroke="#00ff88" stroke-width="2"/>
  <text x="385" y="75" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#00ff88">Stage 2</text>
  <text x="385" y="90" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#e0e0e0">PowerShell</text>
  <text x="385" y="105" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#e0e0e0">WSL + Arch Setup</text>

  <!-- Stage 3: Bash -->
  <rect x="600" y="50" width="120" height="80" rx="8" fill="#0f0f0f" stroke="#00ff88" stroke-width="2"/>
  <text x="660" y="75" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#00ff88">Stage 3</text>
  <text x="660" y="90" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#e0e0e0">Bash Script</text>
  <text x="660" y="105" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#e0e0e0">AI Agents Configured</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ff88"/>
    </marker>
  </defs>
  <line x1="170" y1="90" x2="325" y2="90" stroke="#00ff88" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="445" y1="90" x2="600" y2="90" stroke="#00ff88" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Labels -->
  <text x="170" y="40" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#e0e0e0">Double-Click</text>
  <text x="445" y="40" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#e0e0e0">Automated Setup</text>
  <text x="660" y="40" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#e0e0e0">Ready to Use</text>
</svg>