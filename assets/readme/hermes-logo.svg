<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Caduceus Staff -->
  <line x1="60" y1="20" x2="60" y2="100" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  <!-- Two Snakes -->
  <path d="M60,20 Q40,40 60,60 Q80,40 60,20" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <path d="M60,60 Q40,80 60,100 Q80,80 60,60" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <!-- Wings -->
  <path d="M40,40 L20,20 L40,20 Z" fill="#00ff88" opacity="0.7"/>
  <path d="M80,40 L100,20 L80,20 Z" fill="#00ff88" opacity="0.7"/>
</svg>